services:
  app:
    build:
      context: ./e_banking
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL-}
    image: e-pay-sandbox:latest
    container_name: e-pay-sandbox-app
    env_file:
      - ./e_banking/backend/.env.backend
    environment:
      PORT: 5001
      FLASK_ENV: production
    expose:
      - "5001"
    networks:
      - e-pay-sandbox
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/health', timeout=5)\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: e-pay-sandbox-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - e-pay-sandbox
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-check-certificate -qO- https://127.0.0.1/health >/dev/null"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: e-pay-sandbox-zap
    profiles:
      - security-tools
    command:
      [
        "zap-baseline.py",
        "-t",
        "https://nginx",
        "-r",
        "zap-baseline-report.html"
      ]
    volumes:
      - ./zap-reports:/zap/wrk:rw
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - e-pay-sandbox

networks:
  e-pay-sandbox:
    name: e-pay-sandbox
